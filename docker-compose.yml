version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: crowdsafe-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crowdsafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crowdsafe_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-crowdsafe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crowdsafe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crowdsafe-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  crowdsafe:
    build: .
    container_name: crowdsafe
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./recordings:/app/recordings
      - ./models:/app/models
      - ./instance:/app/instance
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-jwt-secret}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crowdsafe}:${POSTGRES_PASSWORD:-crowdsafe_dev_change_me}@postgres:5432/${POSTGRES_DB:-crowdsafe}
      - RATELIMIT_STORAGE_URI=redis://redis:6379
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: crowdsafe-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - crowdsafe
    restart: unless-stopped

volumes:
  postgres_data:
