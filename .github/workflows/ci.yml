name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: crowdsafe
          POSTGRES_PASSWORD: crowdsafe_ci
          POSTGRES_DB: crowdsafe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crowdsafe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-flask pytest-cov factory-boy

      - name: Ruff lint (syntax + critical errors only)
        run: ruff check --select=E9,F63,F7,F82 --output-format=concise .

      - name: Byte-compile (catches import-time errors)
        env:
          FLASK_ENV: development
        run: python -m compileall -q backend config.py app.py

      - name: Run migrations (Postgres + TimescaleDB)
        env:
          FLASK_ENV: development
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
          DATABASE_URL: postgresql://crowdsafe:crowdsafe_ci@localhost:5432/crowdsafe_test
        run: alembic upgrade head

      - name: Pytest with coverage
        env:
          FLASK_ENV: development
          SECRET_KEY: ci-secret-key
          JWT_SECRET_KEY: ci-jwt-secret
          DATABASE_URL: postgresql://crowdsafe:crowdsafe_ci@localhost:5432/crowdsafe_test
        run: pytest -x --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=0 || echo "tests pending"

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanners
        run: pip install pip-audit bandit

      - name: pip-audit (known CVEs)
        run: pip-audit -r requirements.txt --strict || true

      - name: bandit (static security analysis)
        run: bandit -r backend -ll -q || true
