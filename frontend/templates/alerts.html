{% extends "base.html" %}
{% block title %}Alerts{% endblock %}
{% block page_title %}Alerts{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="filterLevel" onchange="loadAlerts()" style="min-width: 140px; background: var(--bg-1); color: var(--text); border-color: var(--border);">
            <option value="">All Levels</option>
            <option value="CRITICAL">Critical</option>
            <option value="WARNING">Warning</option>
            <option value="CAUTION">Caution</option>
        </select>
        <select class="form-select form-select-sm" id="filterResolved" onchange="loadAlerts()" style="min-width: 140px; background: var(--bg-1); color: var(--text); border-color: var(--border);">
            <option value="">All Status</option>
            <option value="false" selected>Unresolved</option>
            <option value="true">Resolved</option>
        </select>
    </div>
    <span class="badge bg-secondary" id="alertCount">0 alerts</span>
</div>

<div class="alerts-grid" id="alertsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px;">
    <!-- Alert cards will be rendered here by alerts.js -->
</div>
{% endblock %}
{% block scripts %}<script src="{{ url_for('static', filename='js/alerts.js') }}"></script>{% endblock %}
